<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Georgia', serif;
    }

    .letter {
      background: white;
      padding: 40px;
      max-width: 500px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      color: #e63946;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #333;
    }

    .signature {
      margin-top: 30px;
      font-style: italic;
      color: #555;
    }

    .heart {
      font-size: 30px;
      animation: beat 1.2s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="letter">
    <div class="heart">❤️</div>

    <h1>To My Favorite Person</h1>

    <p>
      완벽한 단어는 모르겠지만, 이건 알아:
      너는 평범한 날들을 가볍게 만들어주고, 단순한 순간들을 특별하게 느껴지게 해.

    <p>
      그대로의 너에게 감사해 — 그 웃음, 그 친절로,
    </p>

    <p>
      노력하지 않아도 전해지는 그 따스함으로.
      너 자체가 내가 감사하는 존재야.
    </p>

    <div class="signature">
     — 진심으로 아끼는 누군가에게서
    </div>
  </div>

</body>
</html>
